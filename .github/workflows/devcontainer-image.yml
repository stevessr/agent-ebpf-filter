name: Devcontainer Image

on:
  push:
    branches:
      - "**"
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: devcontainer-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and publish devcontainer
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          base="$(printf '%s' "${GITHUB_REF_NAME}" | sed -E 's#[^A-Za-z0-9_.-]+#-#g; s#^-+##; s#-+$##')"
          if [ -z "$base" ]; then
            base="local"
          fi
          suffix="$(printf '%s' "${GITHUB_REF_NAME}" | sha256sum | cut -c1-12)"
          prefix="$(printf '%s' "$base" | cut -c1-115 | sed -E 's#-+$##')"
          if [ -z "$prefix" ]; then
            prefix="local"
          fi
          slug="${prefix}-${suffix}"
          repo="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${repo}/devcontainer" >> "$GITHUB_OUTPUT"
          echo "tag=${slug}" >> "$GITHUB_OUTPUT"

      - name: Build and push devcontainer image
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          build-args: |
            GO_VERSION=1.26.2
            USER_UID=1001
            USER_GID=1001
          cache-from: type=gha
          cache-to: type=gha,mode=max
