syntax = "proto3";

package pb;
option go_package = "agent-ebpf-filter/pb";

// Normalized event types for kernel + user-space events
enum EventType {
  EXECVE = 0;
  OPENAT = 1;
  NETWORK_CONNECT = 2;
  MKDIR = 3;
  UNLINK = 4;
  IOCTL = 5;
  NETWORK_BIND = 6;
  NETWORK_SENDTO = 7;
  NETWORK_RECVFROM = 8;
  READ = 9;
  WRITE = 10;
  OPEN = 11;
  CHMOD = 12;
  CHOWN = 13;
  RENAME = 14;
  LINK = 15;
  SYMLINK = 16;
  MKNOD = 17;
  CLONE = 18;
  EXIT = 19;
  SOCKET = 20;
  ACCEPT = 21;
  ACCEPT4 = 22;
  WRAPPER_INTERCEPT = 23;
  NATIVE_HOOK = 24;
  GENERIC_SYSCALL = 25;
  SCHED_PROCESS_FORK = 26;
  SCHED_PROCESS_EXEC = 27;
  SCHED_PROCESS_EXIT = 28;
  WAIT4 = 29;
  SEMANTIC_ALERT = 30;
}

enum BehaviorCategory {
  UNKNOWN = 0;
  FILE_READ = 1;
  FILE_WRITE = 2;
  FILE_DELETE = 3;
  FILE_PERMISSION = 4;
  NETWORK = 5;
  PROCESS_EXEC = 6;
  PROCESS_KILL = 7;
  SYSTEM_INFO = 8;
  PACKAGE_MANAGER = 9;
  DATABASE = 10;
  COMPRESSION = 11;
  DEVELOPMENT = 12;
  CONTAINER = 13;
  SENSITIVE = 14;
}

message BehaviorClassification {
  repeated BehaviorCategory categories = 1;
  string primary_category = 2;
  string confidence = 3;
  string reasoning = 4;
}

// Represents a process registration request
message RegisterRequest {
  uint32 pid = 1;
  string tag = 2;
  string agent_run_id = 3;
  string conversation_id = 4;
  string turn_id = 5;
  string tool_call_id = 6;
  string tool_name = 7;
  string trace_id = 8;
  string span_id = 9;
  uint32 root_agent_pid = 10;
  string decision = 11;
  double risk_score = 12;
  string container_id = 13;
  string argv_digest = 14;
  string task_id = 15;
  string cwd = 16;
}

// Represents a process registration response
message RegisterResponse {
  bool success = 1;
  string message = 2;
}

// Represents a process unregistration request
message UnregisterRequest {
  uint32 pid = 1;
}

// Represents a process unregistration response
message UnregisterResponse {
  bool success = 1;
  string message = 2;
}

// Represents an intercepted eBPF event (e.g., file open, exec)
message Event {
  uint32 pid = 1;
  uint32 ppid = 2;
  uint32 uid = 3;
  string type = 4;
  string tag = 5;
  string comm = 6;
  string path = 7;
  string net_direction = 8;
  string net_endpoint = 9;
  uint32 net_bytes = 10;
  string net_family = 11;
  int64 retval = 12;
  string extra_info = 13;
  string extra_path = 14;
  uint64 bytes = 15;
  string mode = 16;
  string domain = 17;
  string sock_type = 18;
  uint32 protocol = 19;
  uint32 uid_arg = 20;
  uint32 gid_arg = 21;
  EventType event_type = 22;
  BehaviorClassification behavior = 23;
  uint64 duration_ns = 24;
  string schema_version = 25;
  uint32 gid = 26;
  uint64 cgroup_id = 27;
  uint32 root_agent_pid = 28;
  string agent_run_id = 29;
  string conversation_id = 30;
  string turn_id = 31;
  string tool_call_id = 32;
  string tool_name = 33;
  string trace_id = 34;
  string span_id = 35;
  string decision = 36;
  double risk_score = 37;
  string container_id = 38;
  string argv_digest = 39;
  string task_id = 40;
  string cwd = 41;
}

message ExecEvent {
  string path = 1;
  int64 retval = 2;
  uint64 duration_ns = 3;
  string extra_info = 4;
  string argv_digest = 5;
  string cwd = 6;
}

message FileEvent {
  string operation = 1;
  string path = 2;
  string extra_path = 3;
  string mode = 4;
  uint64 bytes = 5;
  uint32 uid_arg = 6;
  uint32 gid_arg = 7;
  int64 retval = 8;
  string extra_info = 9;
}

message NetworkEvent {
  string endpoint = 1;
  string direction = 2;
  uint32 bytes = 3;
  string family = 4;
  string domain = 5;
  string sock_type = 6;
  uint32 protocol = 7;
  int64 retval = 8;
  string extra_info = 9;
}

message ProcessEvent {
  string phase = 1;
  uint32 parent_pid = 2;
  uint32 child_pid = 3;
  uint32 old_pid = 4;
  uint32 target_pid = 5;
  int32 exit_status = 6;
  string extra_info = 7;
}

message PolicyEvent {
  string decision = 1;
  double risk_score = 2;
  string reason = 3;
  string related_path = 4;
  string related_endpoint = 5;
}

message WrapperEvent {
  string command_line = 1;
  repeated string args = 2;
  BehaviorClassification behavior = 3;
  string extra_info = 4;
  string tool_name = 5;
}

message HookEvent {
  string hook_name = 1;
  string tool_name = 2;
  string target_path = 3;
  string extra_info = 4;
}

message McpEvent {
  string tool_name = 1;
  string server_name = 2;
  string endpoint = 3;
  string request_id = 4;
  string extra_info = 5;
}

message EventEnvelope {
  string schema_version = 1;
  string event_id = 2;
  uint64 timestamp_ns = 3;
  string source = 4;
  string agent_run_id = 5;
  string task_id = 6;
  string conversation_id = 7;
  string turn_id = 8;
  string tool_call_id = 9;
  string tool_name = 10;
  string trace_id = 11;
  string span_id = 12;
  uint32 pid = 13;
  uint32 tgid = 14;
  uint32 ppid = 15;
  uint32 uid = 16;
  uint32 gid = 17;
  string comm = 18;
  string argv_digest = 19;
  string cwd = 20;
  uint64 cgroup_id = 21;
  string container_id = 22;
  string policy_decision = 23;
  double risk_score = 24;
  EventType event_type = 25;
  Event legacy_event = 26;
  oneof payload {
    ExecEvent exec_event = 27;
    FileEvent file_event = 28;
    NetworkEvent network_event = 29;
    ProcessEvent process_event = 30;
    PolicyEvent policy_event = 31;
    WrapperEvent wrapper_event = 32;
    HookEvent hook_event = 33;
    McpEvent mcp_event = 34;
  }
}

message EventEnvelopeBatch {
  repeated EventEnvelope envelopes = 1;
}

// Batch of events for WebSocket delivery efficiency
message EventBatch {
  repeated Event events = 1;
}

// Represents system process information for the tree view
message Process {
  int32 pid = 1;
  int32 ppid = 2;
  string name = 3;
  double cpu = 4;
  float mem = 5;
  string user = 6;
  uint32 gpu_mem = 7; // GPU VRAM usage in MiB
  uint32 gpu_util = 8; // GPU utilization percentage
  uint32 gpu_id = 9;   // GPU index
  string cmdline = 10;
  int64 create_time = 11;
  uint64 minor_faults = 12; // Page faults that did not require disk I/O
  uint64 major_faults = 13; // Hard page faults that required disk I/O
}

message GPUStatus {
  uint32 index = 1;
  string name = 2;
  uint32 util_gpu = 3;
  uint32 util_mem = 4;
  uint32 mem_total = 5;
  uint32 mem_used = 6;
  uint32 temp = 7;
  // NVIDIA detailed engine stats
  uint32 enc_util = 8;
  uint32 dec_util = 9;
  uint32 sm_clock_mhz = 10;
  uint32 mem_clock_mhz = 11;
  uint32 gfx_clock_mhz = 12;
  uint32 power_w = 13;
  uint32 power_limit_w = 14;
  uint32 fan_speed = 15;
  int32 pcie_gen = 16;
  int32 pcie_width = 17;
}

message CPUInfo {
  message Core {
    uint32 index = 1;
    double usage = 2;
    enum Type {
      PERFORMANCE = 0; // P-core
      EFFICIENCY = 1;  // E-core
      HYPERTHREAD = 2; // SMT thread
    }
    Type type = 3;
  }
  double total = 1;
  repeated double cores = 2; // Keep for backward compatibility
  repeated Core core_details = 3;
}

message MemoryInfo {
  uint64 total = 1;
  uint64 used = 2;
  float percent = 3;
  uint64 cached = 4;
  uint64 buffers = 5;
  uint64 shared = 6;
  uint64 zram_used = 7;
  uint64 zram_total = 8;
  uint64 swap_total = 9;
  uint64 swap_used = 10;
}

message Hook {
  string id = 1;
  string name = 2;
  string description = 3;
  bool installed = 4;
  string target_cmd = 5;
}

message HookRequest {
  string id = 1;
  bool install = 2;
}

message HookResponse {
  bool success = 1;
  string message = 2;
}

message NetworkInterface {
  string name = 1;
  uint64 recv_bytes = 2;
  uint64 sent_bytes = 3;
}

message DiskDevice {
  string name = 1;
  uint64 read_bytes = 2;
  uint64 write_bytes = 3;
}

message IOInfo {
  uint64 total_read_bytes = 1;
  uint64 total_write_bytes = 2;
  uint64 total_net_recv_bytes = 3;
  uint64 total_net_sent_bytes = 4;
  repeated NetworkInterface networks = 5;
  repeated DiskDevice disks = 6;
}

message FaultInfo {
  uint64 page_faults = 1;      // pgfault
  uint64 major_faults = 2;     // pgmajfault (hard faults)
  uint64 minor_faults = 3;     // page_faults - major_faults
  double page_fault_rate = 4;  // faults/sec
  double major_fault_rate = 5; // hard faults/sec
  double minor_fault_rate = 6; // soft faults/sec
  uint64 swap_in = 7;
  uint64 swap_out = 8;
  double swap_in_rate = 9;
  double swap_out_rate = 10;
}

message SystemStats {
  repeated Process processes = 1;
  repeated GPUStatus gpus = 2;
  CPUInfo cpu = 3;
  MemoryInfo memory = 4;
  IOInfo io = 5;
  FaultInfo faults = 6;
}

message WrapperRequest {
  uint32 pid = 1;
  string comm = 2;
  repeated string args = 3;
  string user = 4;
  string agent_run_id = 5;
  string conversation_id = 6;
  string turn_id = 7;
  string tool_call_id = 8;
  string tool_name = 9;
  string trace_id = 10;
  string span_id = 11;
  uint32 root_agent_pid = 12;
  string decision = 13;
  double risk_score = 14;
  string container_id = 15;
  string argv_digest = 16;
  string task_id = 17;
  string cwd = 18;
}

message WrapperResponse {
  enum Action {
    ALLOW = 0;
    BLOCK = 1;
    REWRITE = 2;
    ALERT = 3;
  }
  Action action = 1;
  string message = 2;
  repeated string rewritten_args = 3;
  BehaviorClassification classification = 4;
  double ml_score = 5;
  double anomaly_score = 6;
  string ml_action = 7;
  string ml_reasoning = 8;
}

message MLStatus {
  bool model_loaded = 1;
  int32 num_trees = 2;
  int32 num_samples = 3;
  int32 num_labeled_samples = 4;
  string last_trained = 5;
  double test_accuracy = 6;
  string model_path = 7;
  bool training_in_progress = 8;
  double training_progress = 9;
}

message ProcessList {
  repeated Process processes = 1;
}

// ── Config / Registry types ──────────────────────────────────────────

message ConfigTag {
  string name = 1;
}

message ConfigTagList {
  repeated string names = 1;
}

message TrackedComm {
  string comm = 1;
  string tag = 2;
  bool disabled = 3;
}

message TrackedCommList {
  repeated TrackedComm items = 1;
}

message TrackedPath {
  string path = 1;
  string tag = 2;
}

message TrackedPathList {
  repeated TrackedPath items = 1;
}

message TrackedPrefix {
  string prefix = 1;
  string tag = 2;
}

message TrackedPrefixList {
  repeated TrackedPrefix items = 1;
}

message WrapperRule {
  string comm = 1;
  string action = 2;
  repeated string rewritten_cmd = 3;
  string regex = 4;
  string replacement = 5;
  int32 priority = 6;
}

message WrapperRuleList {
  repeated WrapperRule items = 1;
}

message RuntimeSettings {
  bool log_persistence_enabled = 1;
  string log_file_path = 2;
  string access_token = 3;
  int32 max_event_count = 4;
  string max_event_age = 5;
  bool shell_sessions_enabled = 6;
  bool system_run_enabled = 7;
  bool hook_management_enabled = 8;
  bool policy_management_enabled = 9;
  bool otlp_enabled = 10;
  string otlp_endpoint = 11;
  string otlp_service_name = 12;
  map<string, string> otlp_headers = 13;
}

message RuntimeConfigResponse {
  RuntimeSettings runtime = 1;
  string mcp_endpoint = 2;
  string auth_header_name = 3;
  string bearer_auth_header_name = 4;
  string persisted_event_log_path = 5;
  bool persisted_event_log_alive = 6;
}

message ExportConfigData {
  repeated string tags = 1;
  repeated TrackedComm comms = 2;
  repeated TrackedPath paths = 3;
  repeated TrackedPrefix prefixes = 4;
  repeated WrapperRule rules = 5;
  RuntimeSettings runtime = 6;
}

message StatusResponse {
  string status = 1;
  string message = 2;
}

// ── File browsing types ──────────────────────────────────────────────

message FileEntry {
  string name = 1;
  bool is_dir = 2;
  string path = 3;
  string mime_type = 4;
  int64 size = 5;
  string mod_time = 6;
}

message FileListResponse {
  repeated FileEntry items = 1;
  int32 total = 2;
  int32 offset = 3;
  int32 limit = 4;
}

message FilePreviewResponse {
  string content = 1;
  string mime_type = 2;
  string path = 3;
  int64 size = 4;
  string mod_time = 5;
  bool truncated = 6;
}

// ── Systemd / Sensors types ──────────────────────────────────────────

message SystemdUnit {
  string unit = 1;
  string load = 2;
  string active = 3;
  string sub = 4;
  string description = 5;
}

message SystemdUnitList {
  repeated SystemdUnit services = 1;
}

message SensorReading {
  string key = 1;
  double value = 2;
  string unit = 3;
}

message SensorsSnapshot {
  repeated SensorReading temperatures = 1;
  repeated string fans = 2;
}

// ── Shell session types ──────────────────────────────────────────────

message ShellSession {
  string id = 1;
  string label = 2;
  int32 pid = 3;
  bool active = 4;
  int64 created_at = 5;
  string cols = 6;
  string rows = 7;
  string cwd = 8;
}

message ShellSessionList {
  repeated ShellSession sessions = 1;
}

message ShellSessionCreateRequest {
  string workdir = 1;
  repeated string args = 2;
  string label = 3;
}

// ── Event history types ──────────────────────────────────────────────

message CapturedEventRecord {
  Event event = 1;
  int64 timestamp = 2;
  EventEnvelope envelope = 3;
}

message EventHistoryResponse {
  repeated CapturedEventRecord events = 1;
  string source = 2;
}

// ── Generic request/response wrappers ────────────────────────────────

message ConfigKeyRequest {
  string key = 1;
  string name = 2;
}

message ConfigBoolResponse {
  bool value = 1;
  string message = 2;
}
