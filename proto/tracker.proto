syntax = "proto3";

package pb;
option go_package = "agent-ebpf-filter/pb";

// Normalized event types for kernel + user-space events
enum EventType {
  EXECVE = 0;
  OPENAT = 1;
  NETWORK_CONNECT = 2;
  MKDIR = 3;
  UNLINK = 4;
  IOCTL = 5;
  NETWORK_BIND = 6;
  NETWORK_SENDTO = 7;
  NETWORK_RECVFROM = 8;
  READ = 9;
  WRITE = 10;
  OPEN = 11;
  CHMOD = 12;
  CHOWN = 13;
  RENAME = 14;
  LINK = 15;
  SYMLINK = 16;
  MKNOD = 17;
  CLONE = 18;
  EXIT = 19;
  SOCKET = 20;
  ACCEPT = 21;
  ACCEPT4 = 22;
  WRAPPER_INTERCEPT = 23;
  NATIVE_HOOK = 24;
}

enum BehaviorCategory {
  UNKNOWN = 0;
  FILE_READ = 1;
  FILE_WRITE = 2;
  FILE_DELETE = 3;
  FILE_PERMISSION = 4;
  NETWORK = 5;
  PROCESS_EXEC = 6;
  PROCESS_KILL = 7;
  SYSTEM_INFO = 8;
  PACKAGE_MANAGER = 9;
  DATABASE = 10;
  COMPRESSION = 11;
  DEVELOPMENT = 12;
  CONTAINER = 13;
  SENSITIVE = 14;
}

message BehaviorClassification {
  repeated BehaviorCategory categories = 1;
  string primary_category = 2;
  string confidence = 3;
  string reasoning = 4;
}

// Represents a process registration request
message RegisterRequest {
  uint32 pid = 1;
}

// Represents a process registration response
message RegisterResponse {
  bool success = 1;
  string message = 2;
}

// Represents a process unregistration request
message UnregisterRequest {
  uint32 pid = 1;
}

// Represents a process unregistration response
message UnregisterResponse {
  bool success = 1;
  string message = 2;
}

// Represents an intercepted eBPF event (e.g., file open, exec)
message Event {
  uint32 pid = 1;
  uint32 ppid = 2;
  uint32 uid = 3;
  string type = 4;
  string tag = 5;
  string comm = 6;
  string path = 7;
  string net_direction = 8;
  string net_endpoint = 9;
  uint32 net_bytes = 10;
  string net_family = 11;
  int64 retval = 12;
  string extra_info = 13;
  string extra_path = 14;
  uint64 bytes = 15;
  string mode = 16;
  string domain = 17;
  string sock_type = 18;
  uint32 protocol = 19;
  uint32 uid_arg = 20;
  uint32 gid_arg = 21;
  EventType event_type = 22;
  BehaviorClassification behavior = 23;
}

// Batch of events for WebSocket delivery efficiency
message EventBatch {
  repeated Event events = 1;
}

// Represents system process information for the tree view
message Process {
  int32 pid = 1;
  int32 ppid = 2;
  string name = 3;
  double cpu = 4;
  float mem = 5;
  string user = 6;
  uint32 gpu_mem = 7; // GPU VRAM usage in MiB
  uint32 gpu_util = 8; // GPU utilization percentage
  uint32 gpu_id = 9;   // GPU index
  string cmdline = 10;
  int64 create_time = 11;
  uint64 minor_faults = 12; // Page faults that did not require disk I/O
  uint64 major_faults = 13; // Hard page faults that required disk I/O
}

message GPUStatus {
  uint32 index = 1;
  string name = 2;
  uint32 util_gpu = 3;
  uint32 util_mem = 4;
  uint32 mem_total = 5;
  uint32 mem_used = 6;
  uint32 temp = 7;
  // NVIDIA detailed engine stats
  uint32 enc_util = 8;
  uint32 dec_util = 9;
  uint32 sm_clock_mhz = 10;
  uint32 mem_clock_mhz = 11;
  uint32 gfx_clock_mhz = 12;
  uint32 power_w = 13;
  uint32 power_limit_w = 14;
  uint32 fan_speed = 15;
  int32 pcie_gen = 16;
  int32 pcie_width = 17;
}

message CPUInfo {
  message Core {
    uint32 index = 1;
    double usage = 2;
    enum Type {
      PERFORMANCE = 0; // P-core
      EFFICIENCY = 1;  // E-core
      HYPERTHREAD = 2; // SMT thread
    }
    Type type = 3;
  }
  double total = 1;
  repeated double cores = 2; // Keep for backward compatibility
  repeated Core core_details = 3;
}

message MemoryInfo {
  uint64 total = 1;
  uint64 used = 2;
  float percent = 3;
  uint64 cached = 4;
  uint64 buffers = 5;
  uint64 shared = 6;
  uint64 zram_used = 7;
  uint64 zram_total = 8;
  uint64 swap_total = 9;
  uint64 swap_used = 10;
}

message Hook {
  string id = 1;
  string name = 2;
  string description = 3;
  bool installed = 4;
  string target_cmd = 5;
}

message HookRequest {
  string id = 1;
  bool install = 2;
}

message HookResponse {
  bool success = 1;
  string message = 2;
}

message NetworkInterface {
  string name = 1;
  uint64 recv_bytes = 2;
  uint64 sent_bytes = 3;
}

message DiskDevice {
  string name = 1;
  uint64 read_bytes = 2;
  uint64 write_bytes = 3;
}

message IOInfo {
  uint64 total_read_bytes = 1;
  uint64 total_write_bytes = 2;
  uint64 total_net_recv_bytes = 3;
  uint64 total_net_sent_bytes = 4;
  repeated NetworkInterface networks = 5;
  repeated DiskDevice disks = 6;
}

message FaultInfo {
  uint64 page_faults = 1;      // pgfault
  uint64 major_faults = 2;     // pgmajfault (hard faults)
  uint64 minor_faults = 3;     // page_faults - major_faults
  double page_fault_rate = 4;  // faults/sec
  double major_fault_rate = 5; // hard faults/sec
  double minor_fault_rate = 6; // soft faults/sec
  uint64 swap_in = 7;
  uint64 swap_out = 8;
  double swap_in_rate = 9;
  double swap_out_rate = 10;
}

message SystemStats {
  repeated Process processes = 1;
  repeated GPUStatus gpus = 2;
  CPUInfo cpu = 3;
  MemoryInfo memory = 4;
  IOInfo io = 5;
  FaultInfo faults = 6;
}

message WrapperRequest {
  uint32 pid = 1;
  string comm = 2;
  repeated string args = 3;
  string user = 4;
}

message WrapperResponse {
  enum Action {
    ALLOW = 0;
    BLOCK = 1;
    REWRITE = 2;
    ALERT = 3;
  }
  Action action = 1;
  string message = 2;
  repeated string rewritten_args = 3;
  BehaviorClassification classification = 4;
}

message ProcessList {
  repeated Process processes = 1;
}

// ── Config / Registry types ──────────────────────────────────────────

message ConfigTag {
  string name = 1;
}

message ConfigTagList {
  repeated string names = 1;
}

message TrackedComm {
  string comm = 1;
  string tag = 2;
  bool disabled = 3;
}

message TrackedCommList {
  repeated TrackedComm items = 1;
}

message TrackedPath {
  string path = 1;
  string tag = 2;
}

message TrackedPathList {
  repeated TrackedPath items = 1;
}

message TrackedPrefix {
  string prefix = 1;
  string tag = 2;
}

message TrackedPrefixList {
  repeated TrackedPrefix items = 1;
}

message WrapperRule {
  string comm = 1;
  string action = 2;
  repeated string rewritten_cmd = 3;
  string regex = 4;
  string replacement = 5;
  int32 priority = 6;
}

message WrapperRuleList {
  repeated WrapperRule items = 1;
}

message RuntimeSettings {
  bool log_persistence_enabled = 1;
  string log_file_path = 2;
  string access_token = 3;
  int32 max_event_count = 4;
  string max_event_age = 5;
}

message RuntimeConfigResponse {
  RuntimeSettings runtime = 1;
  string mcp_endpoint = 2;
  string auth_header_name = 3;
  string bearer_auth_header_name = 4;
  string persisted_event_log_path = 5;
  bool persisted_event_log_alive = 6;
}

message ExportConfigData {
  repeated string tags = 1;
  repeated TrackedComm comms = 2;
  repeated TrackedPath paths = 3;
  repeated TrackedPrefix prefixes = 4;
  repeated WrapperRule rules = 5;
  RuntimeSettings runtime = 6;
}

message StatusResponse {
  string status = 1;
  string message = 2;
}

// ── File browsing types ──────────────────────────────────────────────

message FileEntry {
  string name = 1;
  bool is_dir = 2;
  string path = 3;
  string mime_type = 4;
  int64 size = 5;
  string mod_time = 6;
}

message FileListResponse {
  repeated FileEntry items = 1;
  int32 total = 2;
  int32 offset = 3;
  int32 limit = 4;
}

message FilePreviewResponse {
  string content = 1;
  string mime_type = 2;
  string path = 3;
  int64 size = 4;
  string mod_time = 5;
  bool truncated = 6;
}

// ── Systemd / Sensors types ──────────────────────────────────────────

message SystemdUnit {
  string unit = 1;
  string load = 2;
  string active = 3;
  string sub = 4;
  string description = 5;
}

message SystemdUnitList {
  repeated SystemdUnit services = 1;
}

message SensorReading {
  string key = 1;
  double value = 2;
  string unit = 3;
}

message SensorsSnapshot {
  repeated SensorReading temperatures = 1;
  repeated string fans = 2;
}

// ── Shell session types ──────────────────────────────────────────────

message ShellSession {
  string id = 1;
  string label = 2;
  int32 pid = 3;
  bool active = 4;
  int64 created_at = 5;
  string cols = 6;
  string rows = 7;
  string cwd = 8;
}

message ShellSessionList {
  repeated ShellSession sessions = 1;
}

message ShellSessionCreateRequest {
  string workdir = 1;
  repeated string args = 2;
  string label = 3;
}

// ── Event history types ──────────────────────────────────────────────

message CapturedEventRecord {
  Event event = 1;
  int64 timestamp = 2;
}

message EventHistoryResponse {
  repeated CapturedEventRecord events = 1;
  string source = 2;
}

// ── Generic request/response wrappers ────────────────────────────────

message ConfigKeyRequest {
  string key = 1;
  string name = 2;
}

message ConfigBoolResponse {
  bool value = 1;
  string message = 2;
}
