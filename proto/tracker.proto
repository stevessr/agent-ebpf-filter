syntax = "proto3";

package pb;
option go_package = "agent-ebpf-filter/pb";

// Represents a process registration request
message RegisterRequest {
  uint32 pid = 1;
}

// Represents a process registration response
message RegisterResponse {
  bool success = 1;
  string message = 2;
}

// Represents a process unregistration request
message UnregisterRequest {
  uint32 pid = 1;
}

// Represents a process unregistration response
message UnregisterResponse {
  bool success = 1;
  string message = 2;
}

// Represents an intercepted eBPF event (e.g., file open, exec)
message Event {
  uint32 pid = 1;
  uint32 ppid = 2;
  uint32 uid = 3;
  string type = 4;
  string tag = 5;
  string comm = 6;
  string path = 7;
}

// Represents system process information for the tree view
message Process {
  int32 pid = 1;
  int32 ppid = 2;
  string name = 3;
  double cpu = 4;
  float mem = 5;
  string user = 6;
  uint32 gpu_mem = 7; // GPU VRAM usage in MiB
}

message ProcessList {
  repeated Process processes = 1;
}

